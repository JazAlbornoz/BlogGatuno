    <section  class="sectionCrearArt">
        <form action="/" class="agregarArt">
         <h3 class="tituloCrearArt">Crear nuevo articulo</h3>

         <p class="parrafoCrearArt">Agregar titulo</p>
         <input class="inputCrearArt agregartitulo" placeholder="Escribe el título de tu articulo" type="text" size="50">

         <p class="parrafoCrearArt">Agregar subtitulo</p>
         <input class="inputCrearArt agregarSubtitulo" placeholder="Escribe un subtítulo para tu articulo" type="text" size="50">

         <p class="parrafoCrearArt">Agregar imagen</p>
         <input class="inputCrearArt agregarImagen" placeholder="Sube una imagen" type="file">

         <p class="parrafoCrearArt">Agregar tiempo de lectura</p>
         <input class="inputCrearArtNum agregarTiempo" placeholder="Tiempo de lectura" type="number" size="50">

         <p class="parrafoCrearArt">Agregar año actual</p>
         <input class="inputCrearArtNum agregarAño" placeholder="Año de publicación" type="number" size="50">

         <p class="parrafoCrearArt">Agregar contenido del blog</p>
         <input class="inputCrearArt inputTextAgArt agregarTexto" placeholder="Escribe el contenido del articulo" type="text" >

         <button class="botonPublicarArt" onclick="agregarArt()">Publicar</button>
        </form>

     </section>
